<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>特定商取引法に基づく表記</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
      line-height: 1.8;
    }
    h1 {
      font-size: 1.5rem;
      border-bottom: 2px solid #333;
      padding-bottom: 8px;
      margin-bottom: 24px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 12px 16px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background-color: #f7f7f7;
      width: 30%;
      font-weight: 600;
    }
    @media (max-width: 600px) {
      th, td { padding: 8px 10px; font-size: 0.9rem; }
      th { width: 35%; }
    }
  </style>
</head>
<body>
  <h1>特定商取引法に基づく表記</h1>
  <table>
    <tr>
      <th>販売業者</th>
      <td>下島 海</td>
    </tr>
    <tr>
      <th>所在地</th>
      <td>請求があった場合に遅滞なく開示いたします</td>
    </tr>
    <tr>
      <th>電話番号</th>
      <td>請求があった場合に遅滞なく開示いたします</td>
    </tr>
    <tr>
      <th>メールアドレス</th>
      <td>s.kai.0418@gmail.com</td>
    </tr>
    <tr>
      <th>販売価格</th>
      <td>各サービスページに記載の価格に準じます</td>
    </tr>
    <tr>
      <th>販売価格以外の必要料金</th>
      <td>なし</td>
    </tr>
    <tr>
      <th>支払方法</th>
      <td>クレジットカード（Stripe決済）</td>
    </tr>
    <tr>
      <th>支払時期</th>
      <td>サービス提供後、決済リンクよりお支払い</td>
    </tr>
    <tr>
      <th>サービス提供時期</th>
      <td>お申し込み後、双方合意の日時に提供いたします</td>
    </tr>
    <tr>
      <th>キャンセル・返金</th>
      <td>サービス開始前のキャンセルは全額返金いたします。サービス開始後の返金はお受けできません。</td>
    </tr>
  </table>
</body>
</html>
